[workspace]
resolver = "3"
members = [
    # Applications
    "apps/*",

    # Features (vertical slices)
    "crates/features/*",

    # Shared libraries
    "crates/mhub",
    "crates/shared/*",

    # Infrastructure
    "infra/*",

    # Tooling
    "xtask"
]
exclude = []
default-members = ["apps/shell"]

[workspace.package]
edition = "2024"
version = "0.0.0"
rust-version = "1.92.0"
description = "MusterHub"
keywords = ["musterhub", "education", "training", "modular", "platform"]
authors = ["Anatolii Shliakhto <a.shlyakhto@gmail.com>"]
repository = "https://github.com/AnatoliiShliakhto/mhub"
readme = "README.md"
license = "MIT"

[profile.dev]
opt-level = 1
debug = true
split-debuginfo = "unpacked"

[profile.dev.package."*"]
opt-level = 2

[profile.release]
opt-level = 3           # Optimization level
lto = "thin"             # Full Link Time Optimization across all crates
codegen-units = 1       # Reduces parallelism for better binary optimization
panic = "abort"         # Reduces binary size by removing stack unwinding
strip = "symbols"       # Automatically removes debug symbols (reduces size by ~20-40%)
debug = false

[profile.release.package."*"]
opt-level = 3

[profile.test]
opt-level = 0
debug = true

[patch.'crates-io']

[workspace.metadata]
features = [
    { name = "api", description = "Backend", required = false },
    { name = "ui", description = "Frontend", required = false },
]

[workspace.metadata.mhub]
features = [
    { name = "auth", description = "Authentication & Authorization", required = true },
]

[workspace.dependencies]
# Gateway crate
mhub = { path = "crates/mhub", default-features = false }

# Infrastructure
mhub-db = { path = "infra/db" }
mhub-event-bus = { path = "infra/events" }
mhub-logger = { path = "infra/logger" }
mhub-derive = { path = "infra/derive" }
mhub-runtime = { path = "infra/runtime" }
mhub-vault = { path = "infra/vault" }

# Shared
mhub-kernel = { path = "crates/shared/kernel", default-features = false }
mhub-domain = { path = "crates/shared/domain" }

# Features (with default-features = false!)
mhub-auth = { path = "crates/features/auth", default-features = false }

## Workspace dependencies
anyhow = "1.0.100"
axum = { version = "0.8.8", default-features = false }
axum-server = "0.8.0"
bitflags = { version = "2.10.0", features = ["serde"] }
config = "0.15.19"
dioxus = "0.7.2"
fxhash = "0.2.1"
parking_lot = "0.12.5"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
surrealdb = { version = "3.0.0-beta.1", default-features = false }
thiserror = "2.0.17"
tokio = { version = "1.49.0", default-features = false }
tower = "0.5.2"
tower-http = "0.6.8"
tracing = "0.1.44"
tracing-appender = "0.2.4"
tracing-subscriber = { version = "0.3.22", default-features = false }
utoipa = { version = "5.4.0", default-features = false, features = ["macros"] }
utoipa-axum = "0.2.0"
utoipa-scalar = "0.3.0"

## Security
ed25519-dalek = "3.0.0-pre.4"
aes-gcm = { version = "0.11.0-rc.2", default-features = false }
base64 = "0.22.1"
lz4_flex = "0.12.0"
sha2 = "0.11.0-rc.3"
hkdf = "0.13.0-rc.3"
zeroize = { version = "1.8.2", features = ["derive"] }
chacha20poly1305 = "0.11.0-rc.2"
rand = { version = "0.9.2", default-features = false }
machineid-rs = "1.2.4"

## Dev dependencies
cargo-generate = { version = "0.23.7", default-features = false }
clap = { version = "4.5.54", features = ["derive"] }
quote = "1.0.43"
serial_test = "3.3.1"
syn = { version = "2.0.114", features = ["full", "parsing"] }
tempfile = "3.24.0"
toml = "0.9.10"

[workspace.lints.rust]
# remember to update RUSTFLAGS in ci.yml if you add something here

elided_lifetimes_in_paths = "warn"
explicit_outlives_requirements = "warn"
unsafe_op_in_unsafe_fn = "warn"
unused_extern_crates = "warn"
unused_lifetimes = "warn"

[workspace.lints.clippy]
## lint groups
complexity = { level = "warn", priority = -1 }
correctness = { level = "deny", priority = -1 }
nursery = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
perf = { level = "deny", priority = -1 }
restriction = { level = "allow", priority = -1 }
style = { level = "warn", priority = -1 }
suspicious = { level = "warn", priority = -1 }

## allow the following lints
too_long_first_doc_paragraph = "allow"
single_match = "allow"
result_unit_err = "allow"
len_without_is_empty = "allow"
enum_variant_names = "allow"
new_ret_no_self = "allow"
useless_asref = "allow"
assigning_clones = "allow"
vec_init_then_push = "allow"
literal_string_with_formatting_args = "allow"
unnecessary_map_or = "allow"
too_many_arguments = "allow"
type_complexity = "allow"
wrong_self_convention = "allow"
dbg_macro = "warn"
todo = "warn"
print_stdout = "warn"
print_stderr = "warn"
rc_buffer = "warn"
str_to_string = "warn"
unused_crate_dependencies = "warn"