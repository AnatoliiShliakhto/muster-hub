[alias]
xtask = "run --package xtask --bin xtask --"
tq = "test --workspace --all-targets --features server,client -- -q"
qt = "tq"
lint = "clippy --workspace --all-targets --features server,client -- --cap-lints warn"
codegen = "run --package xtask --bin xtask -- codegen"
dist = "run --package xtask --bin xtask -- dist"
check-all = "check --workspace --all-targets --features server,client"

[build]
incremental = true
target-dir = "target"

[target.x86_64-pc-windows-msvc]
linker = "rust-lld"
rustflags = ["-C", "target-feature=+crt-static", "-C", "link-arg=/DEBUG:FASTLINK"]

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[registries.crates-io]
protocol = "sparse"

[env]
CARGO_INCREMENTAL = "1"
CARGO_WORKSPACE_DIR = { value = "", relative = true }